<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c0392b"/>
    </marker>
    <marker id="arrowB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2980b9"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#27ae60"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">InkTime Smartwatch - System Block Diagram</text>

  <!-- ==================== MCU ==================== -->
  <rect x="310" y="180" width="280" height="260" rx="8" fill="#ecf0f1" stroke="#2c3e50" stroke-width="2"/>
  <rect x="310" y="180" width="280" height="30" rx="8" fill="#2c3e50"/>
  <rect x="310" y="202" width="280" height="8" fill="#2c3e50"/>
  <text x="450" y="200" text-anchor="middle" font-size="13" font-weight="bold" fill="white">nRF52840 (U1)</text>
  <text x="450" y="230" text-anchor="middle" font-size="10" fill="#7f8c8d">ARM Cortex-M4F @ 64 MHz</text>
  <text x="450" y="245" text-anchor="middle" font-size="10" fill="#7f8c8d">BLE 5.0 · 1 MB Flash · 256 KB RAM</text>

  <!-- MCU interface labels -->
  <text x="325" y="275" font-size="9" fill="#2980b9" font-weight="bold">SPI</text>
  <text x="325" y="300" font-size="9" fill="#27ae60" font-weight="bold">I2C</text>
  <text x="325" y="325" font-size="9" fill="#8e44ad" font-weight="bold">USB</text>
  <text x="325" y="350" font-size="9" fill="#e67e22" font-weight="bold">GPIO</text>
  <text x="325" y="375" font-size="9" fill="#c0392b" font-weight="bold">RF</text>
  <text x="325" y="400" font-size="9" fill="#555" font-weight="bold">SWD</text>
  <text x="325" y="425" font-size="9" fill="#555" font-weight="bold">CLK</text>

  <text x="385" y="275" font-size="8" fill="#555">P0.02, P0.03, P0.05</text>
  <text x="385" y="300" font-size="8" fill="#555">P0.06 (SDA) / P0.07 (SCL)</text>
  <text x="385" y="325" font-size="8" fill="#555">D+, D−, VBUS</text>
  <text x="385" y="350" font-size="8" fill="#555">P0.08–P0.17, P1.01–P1.08</text>
  <text x="385" y="375" font-size="8" fill="#555">ANT pin → matching → ANT1</text>
  <text x="385" y="400" font-size="8" fill="#555">SWDIO, SWDCLK, SWO</text>
  <text x="385" y="425" font-size="8" fill="#555">XC1/XC2, XL1/XL2</text>

  <!-- ==================== E-Paper Display ==================== -->
  <rect x="20" y="200" width="200" height="100" rx="6" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5"/>
  <text x="120" y="225" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e8449">E-Paper Display</text>
  <text x="120" y="242" text-anchor="middle" font-size="9" fill="#555">1.54" 200×200 px (J2)</text>
  <text x="120" y="258" text-anchor="middle" font-size="8" fill="#777">SPI: MOSI, SCK, CS</text>
  <text x="120" y="272" text-anchor="middle" font-size="8" fill="#777">GPIO: DC, RST, BUSY, GATE</text>
  <text x="120" y="288" text-anchor="middle" font-size="8" fill="#777">Boost: Q1, Q3, D2/D4/D5, L5</text>
  <!-- Arrow: MCU → EPD -->
  <line x1="310" y1="270" x2="224" y2="250" stroke="#2980b9" stroke-width="1.5" marker-end="url(#arrowB)"/>

  <!-- ==================== IMU ==================== -->
  <rect x="20" y="340" width="200" height="70" rx="6" fill="#d6eaf8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="120" y="365" text-anchor="middle" font-size="11" font-weight="bold" fill="#2471a3">BMA421 (IC3)</text>
  <text x="120" y="382" text-anchor="middle" font-size="9" fill="#555">Accelerometer / Step Counter</text>
  <text x="120" y="398" text-anchor="middle" font-size="8" fill="#777">I2C · INT1→P0.08 · INT2→P1.08</text>
  <!-- Arrow: MCU → IMU -->
  <line x1="310" y1="360" x2="224" y2="370" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrowG)"/>

  <!-- ==================== Haptic ==================== -->
  <rect x="20" y="440" width="200" height="70" rx="6" fill="#fdebd0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="120" y="465" text-anchor="middle" font-size="11" font-weight="bold" fill="#ca6f1e">DRV2605 (IC2)</text>
  <text x="120" y="482" text-anchor="middle" font-size="9" fill="#555">Haptic Driver + FIT0774 Shaker</text>
  <text x="120" y="498" text-anchor="middle" font-size="8" fill="#777">I2C · EN→P0.12</text>
  <!-- Arrow: MCU → Haptic -->
  <line x1="310" y1="390" x2="224" y2="460" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrowG)"/>

  <!-- ==================== USB-C ==================== -->
  <rect x="660" y="60" width="200" height="80" rx="6" fill="#f5eef8" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="760" y="88" text-anchor="middle" font-size="11" font-weight="bold" fill="#6c3483">USB-C (J4)</text>
  <text x="760" y="105" text-anchor="middle" font-size="9" fill="#555">KH-TYPE-C-16P</text>
  <text x="760" y="120" text-anchor="middle" font-size="8" fill="#777">5V Power + USB 2.0 Data</text>
  <text x="760" y="132" text-anchor="middle" font-size="8" fill="#777">USBLC6-2SC6Y (D3) ESD Prot.</text>

  <!-- ==================== BQ25180 ==================== -->
  <rect x="660" y="180" width="200" height="80" rx="6" fill="#fdedec" stroke="#c0392b" stroke-width="1.5"/>
  <text x="760" y="205" text-anchor="middle" font-size="11" font-weight="bold" fill="#a93226">BQ25180 (IC1)</text>
  <text x="760" y="222" text-anchor="middle" font-size="9" fill="#555">LiPo Charger</text>
  <text x="760" y="238" text-anchor="middle" font-size="8" fill="#777">I2C config · INT→P0.11</text>
  <text x="760" y="252" text-anchor="middle" font-size="8" fill="#777">VBUS → VREG/VBAT</text>
  <!-- Arrow: USB → BQ -->
  <line x1="760" y1="140" x2="760" y2="176" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="770" y="162" font-size="8" fill="#c0392b" font-weight="bold">VBUS</text>

  <!-- ==================== Battery ==================== -->
  <rect x="660" y="300" width="200" height="60" rx="6" fill="#fef9e7" stroke="#f1c40f" stroke-width="1.5"/>
  <text x="760" y="322" text-anchor="middle" font-size="11" font-weight="bold" fill="#b7950b">LiPo Battery</text>
  <text x="760" y="340" text-anchor="middle" font-size="9" fill="#555">LP502030 · 3.7V / 250 mAh</text>
  <!-- Arrow: BQ → Battery -->
  <line x1="760" y1="260" x2="760" y2="296" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="770" y="282" font-size="8" fill="#c0392b" font-weight="bold">VBAT</text>

  <!-- ==================== MAX17048 ==================== -->
  <rect x="660" y="395" width="200" height="60" rx="6" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5"/>
  <text x="760" y="418" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e8449">MAX17048 (U2)</text>
  <text x="760" y="438" text-anchor="middle" font-size="9" fill="#555">Fuel Gauge · I2C · ALERT→P0.10</text>
  <!-- Arrow: Battery → Fuel Gauge -->
  <line x1="760" y1="360" x2="760" y2="391" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ==================== RT6160 ==================== -->
  <rect x="660" y="490" width="200" height="70" rx="6" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="760" y="515" text-anchor="middle" font-size="11" font-weight="bold" fill="#2471a3">RT6160 (IC9)</text>
  <text x="760" y="532" text-anchor="middle" font-size="9" fill="#555">Buck-Boost DC/DC</text>
  <text x="760" y="548" text-anchor="middle" font-size="8" fill="#777">VREG → 3.3V · I2C VSEL</text>
  <!-- Arrow: Fuel gauge area → RT6160 -->
  <line x1="760" y1="455" x2="760" y2="486" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="770" y="475" font-size="8" fill="#c0392b" font-weight="bold">VREG</text>

  <!-- I2C bus line from MCU to right side -->
  <line x1="590" y1="300" x2="630" y2="300" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="630" y1="220" x2="630" y2="530" stroke="#27ae60" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- I2C taps -->
  <line x1="630" y1="220" x2="656" y2="220" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <line x1="630" y1="425" x2="656" y2="425" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <line x1="630" y1="525" x2="656" y2="525" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <text x="618" y="290" font-size="9" fill="#27ae60" font-weight="bold" transform="rotate(-90 618 290)">I2C Bus</text>

  <!-- USB data line from MCU to USB-C -->
  <line x1="590" y1="325" x2="620" y2="325" stroke="#8e44ad" stroke-width="1.2"/>
  <line x1="620" y1="100" x2="620" y2="325" stroke="#8e44ad" stroke-width="1.2"/>
  <line x1="620" y1="100" x2="656" y2="100" stroke="#8e44ad" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  <text x="625" y="155" font-size="8" fill="#8e44ad" font-weight="bold">D+/D−</text>

  <!-- ==================== Buttons ==================== -->
  <rect x="370" y="480" width="170" height="70" rx="6" fill="#f2f4f4" stroke="#555" stroke-width="1.5"/>
  <text x="455" y="502" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">3× Buttons</text>
  <text x="455" y="518" text-anchor="middle" font-size="8" fill="#555">SW_UP (P0.13) · SW_ENT (P0.14)</text>
  <text x="455" y="532" text-anchor="middle" font-size="8" fill="#555">SW_DN (P1.02) · EVP-AKE31A</text>
  <text x="455" y="544" text-anchor="middle" font-size="8" fill="#777">10kΩ pull-down + 1µF debounce</text>
  <!-- Arrow: MCU → Buttons -->
  <line x1="450" y1="440" x2="450" y2="476" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ==================== Antenna ==================== -->
  <rect x="370" y="60" width="170" height="70" rx="6" fill="#fbeee6" stroke="#e67e22" stroke-width="1.5"/>
  <text x="455" y="85" text-anchor="middle" font-size="11" font-weight="bold" fill="#ca6f1e">2.4 GHz Antenna</text>
  <text x="455" y="102" text-anchor="middle" font-size="9" fill="#555">2450AT18B100E (ANT1)</text>
  <text x="455" y="118" text-anchor="middle" font-size="8" fill="#777">Match: L1 3.9 nH, C3/C4 1 pF, C22 DNP</text>
  <!-- Arrow: MCU → Antenna -->
  <line x1="455" y1="180" x2="455" y2="134" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arrowR)"/>

  <!-- ==================== Debug ==================== -->
  <rect x="20" y="80" width="170" height="60" rx="6" fill="#f2f4f4" stroke="#555" stroke-width="1.2"/>
  <text x="105" y="102" text-anchor="middle" font-size="11" font-weight="bold" fill="#2c3e50">TC2030-IDC (J1)</text>
  <text x="105" y="118" text-anchor="middle" font-size="9" fill="#555">SWD Debug + Reset</text>
  <text x="105" y="132" text-anchor="middle" font-size="8" fill="#777">SWDIO · SWDCLK · SWO</text>
  <!-- Arrow: MCU → Debug -->
  <line x1="310" y1="220" x2="194" y2="130" stroke="#555" stroke-width="1.2" marker-end="url(#arrowhead)"/>

  <!-- ==================== Crystals ==================== -->
  <rect x="190" y="460" width="140" height="55" rx="6" fill="#fef9e7" stroke="#b7950b" stroke-width="1.2"/>
  <text x="260" y="480" text-anchor="middle" font-size="10" font-weight="bold" fill="#7d6608">Crystals</text>
  <text x="260" y="495" text-anchor="middle" font-size="8" fill="#555">X1: 32 MHz (RF/Sys)</text>
  <text x="260" y="508" text-anchor="middle" font-size="8" fill="#555">X2: 32.768 kHz (RTC)</text>
  <!-- Arrow -->
  <line x1="310" y1="430" x2="260" y2="456" stroke="#555" stroke-width="1.2" marker-end="url(#arrowhead)"/>

  <!-- ==================== 3V3 Power rail indicator ==================== -->
  <line x1="590" y1="540" x2="595" y2="540" stroke="#c0392b" stroke-width="2"/>
  <line x1="595" y1="440" x2="595" y2="540" stroke="#c0392b" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="590" y1="440" x2="595" y2="440" stroke="#c0392b" stroke-width="2"/>
  <text x="602" y="495" font-size="8" fill="#c0392b" font-weight="bold" transform="rotate(-90 602 495)">3V3 Rail</text>

  <!-- Legend -->
  <rect x="20" y="570" width="860" height="40" rx="4" fill="#f8f9fa" stroke="#ddd"/>
  <line x1="35" y1="590" x2="65" y2="590" stroke="#2980b9" stroke-width="2"/>
  <text x="70" y="594" font-size="9" fill="#555">SPI</text>
  <line x1="110" y1="590" x2="140" y2="590" stroke="#27ae60" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="145" y="594" font-size="9" fill="#555">I2C</text>
  <line x1="185" y1="590" x2="215" y2="590" stroke="#8e44ad" stroke-width="2"/>
  <text x="220" y="594" font-size="9" fill="#555">USB</text>
  <line x1="260" y1="590" x2="290" y2="590" stroke="#e67e22" stroke-width="2"/>
  <text x="295" y="594" font-size="9" fill="#555">GPIO</text>
  <line x1="340" y1="590" x2="370" y2="590" stroke="#c0392b" stroke-width="2"/>
  <text x="375" y="594" font-size="9" fill="#555">Power</text>
  <line x1="430" y1="590" x2="460" y2="590" stroke="#555" stroke-width="1.5"/>
  <text x="465" y="594" font-size="9" fill="#555">Control/Debug</text>
  <text x="770" y="594" font-size="9" fill="#999">Cesar Petrescu · 334CD · TSC 2026</text>
</svg>
